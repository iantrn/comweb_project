<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forum CIR2</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <!-- Navigation -->
    <nav class="navbar navbar-dark bg-dark mb-3">
      <div class="container-fluid">
        <span class="navbar-brand">Forum CIR2</span>
        <div id="authZone">
          <button id="btnShowLogin" class="btn btn-outline-light btn-sm">
            Connexion
          </button>
          <span id="userInfo" class="text-light d-none">
            Connecté : <span id="currentUser"></span>
            <button id="btnLogout" class="btn btn-outline-light btn-sm ms-2">
              Déconnexion
            </button>
          </span>
        </div>
      </div>
    </nav>

    <div class="container-fluid">
      <div class="row">
        <!-- Colonne gauche : liste des sujets -->
        <div class="col-md-4">
          <div class="d-flex justify-content-between align-items-center mb-2">
            <h4>Sujets</h4>
            <button id="btnShowAddTopic" class="btn btn-success btn-sm d-none">
              + Nouveau
            </button>
          </div>

          <!-- Formulaire ajout sujet (caché par défaut) -->
          <div id="formAddTopic" class="card mb-3 d-none">
            <div class="card-body">
              <input
                type="text"
                id="topicTitle"
                class="form-control mb-2"
                placeholder="Titre"
              />
              <textarea
                id="topicContent"
                class="form-control mb-2"
                placeholder="Contenu"
              ></textarea>
              <button id="btnAddTopic" class="btn btn-primary btn-sm">
                Publier
              </button>
              <button id="btnCancelTopic" class="btn btn-secondary btn-sm">
                Annuler
              </button>
            </div>
          </div>

          <div id="topicsList"></div>
        </div>

        <!-- Colonne centre : détail sujet + réponses -->
        <div class="col-md-5">
          <h4>Discussion</h4>
          <div id="topicDetail" class="text-muted">Sélectionnez un sujet…</div>
          <div id="repliesList" class="mt-3"></div>

          <!-- Formulaire ajout réponse -->
          <div id="formAddReply" class="card mt-3 d-none">
            <div class="card-body">
              <textarea
                id="replyContent"
                class="form-control mb-2"
                placeholder="Votre réponse"
              ></textarea>
              <button id="btnAddReply" class="btn btn-primary btn-sm">
                Répondre
              </button>
            </div>
          </div>
        </div>

        <!-- Colonne droite : chat WebSocket -->
        <div class="col-md-3">
          <h4>Chat global</h4>
          <div
            id="chatBox"
            class="border rounded p-2 mb-2 bg-light"
            style="height: 400px; overflow-y: auto"
          ></div>
          <div class="input-group">
            <input
              type="text"
              id="chatInput"
              class="form-control"
              placeholder="Message…"
            />
            <button id="btnSendChat" class="btn btn-primary">Envoyer</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal de connexion -->
    <div id="loginModal" class="modal fade" tabindex="-1">
      <div class="modal-dialog">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title">Connexion</h5>
            <button
              type="button"
              class="btn-close"
              data-bs-dismiss="modal"
            ></button>
          </div>
          <div class="modal-body">
            <input
              type="text"
              id="loginUser"
              class="form-control mb-2"
              placeholder="Login"
            />
            <input
              type="password"
              id="loginPass"
              class="form-control"
              placeholder="Mot de passe"
            />
            <div id="loginError" class="text-danger mt-2"></div>
          </div>
          <div class="modal-footer">
            <button id="btnDoLogin" class="btn btn-primary">
              Se connecter
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Zone messages d'erreur -->
    <div
      id="errorZone"
      class="position-fixed bottom-0 end-0 p-3"
      style="z-index: 1080"
    ></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
    <script src="js/chat.js"></script>
  </body>
</html>
